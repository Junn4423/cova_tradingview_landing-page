<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dky6wyvnm/image/upload/v1765349145/landing_page_assets/album/logocova.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4Color System - Master the Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- ═══════════════════════════════════════════════════════════════
         GOOGLE TRANSLATE WIDGET — UI HACK
         The default bar is hidden; our custom dropdown triggers it.
    ═══════════════════════════════════════════════════════════════ -->
    <style>
      /* 1. Prevent Google from pushing the page down */
      body { top: 0 !important; }

      /* 2. Nuke the ugly top banner iframe */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .skiptranslate > iframe { display: none !important; }

      /* 3. Kill the floating tooltip/balloon */
      #goog-gt-tt,
      #goog-gt-tt *,
      .goog-te-balloon-frame,
      .goog-tooltip,
      .goog-tooltip:hover   { display: none !important; }

      /* 4. Remove blue highlight on translated spans */
      .goog-text-highlight  { background: none !important; box-shadow: none !important; }

      /* 5. Kill Material-design Google Translate activity spinner/overlay */
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-aZ2wEe-OiiCO,
      .VIpgJd-ZVi9od-ORHb             { display: none !important; }

      /* 6. The hidden host element must not affect layout */
      #google_translate_element        { display: none !important; }
    </style>

    <!-- Google Translate init (must be in <head> before the widget script) -->
    <script>
      window.googleTranslateElementInit = function () {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            autoDisplay:  false,         // never auto-display the top bar
            layout: google.translate.TranslateElement.FloatPosition.TOP_LEFT
          },
          'google_translate_element'
        );
      };
    </script>
  </head>
  <body>
    <!-- Hidden Google Translate mount point -->
    <div id="google_translate_element"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Load Google Translate widget asynchronously -->
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </body>
</html>
